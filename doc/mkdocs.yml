site_name: Mosaico-Alchemy Documentation
site_url: https://docs.mosaico-alchemy.dev
repo_url: https://github.com/mosaico-labs/mosaico-alchemy

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# hooks:
#   - hooks/make_llm_page.py

plugins:
  - search
  - typeset
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            filters:
              - "!^__"
              - "^__init__$"
              - "!^_"
              - "!^Q$"
            show_root_heading: true
            separate_signature: true
            merge_init_into_class: true
            show_source: false
            relative_crossrefs: true
            signature_crossrefs: true
            members_order: source
            inherited_members: true
  
nav:
  - Mosaico-Alchemy: 
    - index.md
  - Packs:
    - packs/index.md
    - Manipulation:
      - packs/manipulation/index.md
      - packs/manipulation/extending.md

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

theme:
  logo: assets/mosaico_logomark.svg
  favicon: assets/favicon.svg
  name: material
  font:
    text: Manrope
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.path
    - navigation.indexes
    - navigation.tabs
    - navigation.footer
